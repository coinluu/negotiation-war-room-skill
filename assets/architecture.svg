<svg width="1200" height="640" viewBox="0 0 1200 640" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skill Architecture</title>
  <desc id="desc">Architecture diagram of negotiation-war-room-skill modules.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="640" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="1" stop-color="#ECFEFF"/>
    </linearGradient>
    <style>
      .h1 { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .h2 { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #0F172A; }
      .body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #475569; }
      .label { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0F766E; }
      .white-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #FFFFFF; }
      .white-body { font: 500 14px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #CCFBF1; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748B"/>
    </marker>
  </defs>
  <rect width="1200" height="640" rx="24" fill="url(#bg)"/>
  <text class="h1" x="60" y="70">系统架构：从谈判背景到可执行协议</text>
  <text class="body" x="60" y="104">Negotiation War Room Skill 将输入、框架、场景打法、模板和复盘连接成一个 Agent 可执行的决策系统。</text>

  <rect x="472" y="146" width="256" height="116" rx="22" fill="#0F766E"/>
  <text class="white-title" x="526" y="190">Skill Core</text>
  <text class="white-body" x="508" y="222">skill.md 核心协议</text>
  <text class="white-body" x="494" y="244">工作流 · 安全边界 · 输出结构</text>

  <g>
    <rect x="70" y="330" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="106" y="362">场景识别</text>
    <text class="body" x="100" y="386">scenario routing</text>

    <rect x="285" y="330" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="322" y="362">信息缺口识别</text>
    <text class="body" x="321" y="386">missing context</text>

    <rect x="500" y="330" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="536" y="362">权力指数评分</text>
    <text class="body" x="544" y="386">power index</text>

    <rect x="715" y="330" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="754" y="362">BATNA / ZOPA</text>
    <text class="body" x="752" y="386">agreement zone</text>

    <rect x="930" y="330" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="978" y="362">筹码地图</text>
    <text class="body" x="976" y="386">leverage map</text>
  </g>

  <g>
    <rect x="178" y="470" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="218" y="502">多方案生成</text>
    <text class="body" x="226" y="526">MESO options</text>

    <rect x="393" y="470" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="432" y="502">方案评分</text>
    <text class="body" x="426" y="526">score trade-offs</text>

    <rect x="608" y="470" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="646" y="502">话术生成</text>
    <text class="body" x="640" y="526">scripts/templates</text>

    <rect x="823" y="470" width="180" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="862" y="502">风险审查</text>
    <text class="body" x="856" y="526">risk review</text>

    <rect x="1038" y="470" width="110" height="78" rx="16" fill="#FFFFFF" stroke="#CBD5E1"/>
    <text class="h2" x="1057" y="502">复盘</text>
    <text class="body" x="1056" y="526">recap</text>
  </g>

  <path d="M600 262V304" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M160 408V440H268V462" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M375 408V440H483V462" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M590 408V462" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M805 408V440H698V462" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
  <path d="M1020 408V440H913V462" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="60" y="154" width="260" height="88" rx="18" fill="#E0F2FE" stroke="#7DD3FC"/>
  <text class="label" x="92" y="188">Inputs</text>
  <text class="body" x="92" y="216">谈判背景 · 目标 · 底线 · 证据</text>
  <path d="M320 198H464" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="880" y="154" width="260" height="88" rx="18" fill="#DCFCE7" stroke="#86EFAC"/>
  <text class="label" x="910" y="188">Outputs</text>
  <text class="body" x="910" y="216">方案 · 评分 · 话术 · 确认文本</text>
  <path d="M736 198H872" stroke="#64748B" stroke-width="2" marker-end="url(#arrow)"/>
</svg>
