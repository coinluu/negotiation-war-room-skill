<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Negotiation Workflow</title>
  <desc id="desc">End-to-end workflow from user input to recap optimization.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0B1120"/>
      <stop offset="1" stop-color="#132F2B"/>
    </linearGradient>
    <style>
      .title { font: 800 34px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .step { font: 700 18px -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #F8FAFC; }
      .sub { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #A7F3D0; }
      .num { font: 800 18px -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; fill: #0F172A; }
    </style>
    <marker id="arrow" markerWidth="11" markerHeight="11" refX="9" refY="3.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,7 L10,3.5 z" fill="#5EEAD4"/>
    </marker>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#bg)"/>
  <text class="title" x="58" y="70">工作流：先判断，再出方案，最后复盘优化</text>

  <g transform="translate(58 122)">
    <g>
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#38BDF8"/>
      <circle cx="28" cy="28" r="16" fill="#38BDF8"/>
      <text class="num" x="23" y="34">1</text>
      <text class="step" x="52" y="33">用户输入</text>
      <text class="sub" x="52" y="58">谈判背景</text>
    </g>
    <path d="M192 42H236" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(244 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#38BDF8"/>
      <circle cx="28" cy="28" r="16" fill="#38BDF8"/>
      <text class="num" x="23" y="34">2</text>
      <text class="step" x="52" y="33">场景识别</text>
      <text class="sub" x="52" y="58">scenario routing</text>
    </g>
    <path d="M436 42H480" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(488 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#38BDF8"/>
      <circle cx="28" cy="28" r="16" fill="#38BDF8"/>
      <text class="num" x="23" y="34">3</text>
      <text class="step" x="52" y="33">权力评估</text>
      <text class="sub" x="52" y="58">power index</text>
    </g>
    <path d="M680 42H724" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(732 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#38BDF8"/>
      <circle cx="28" cy="28" r="16" fill="#38BDF8"/>
      <text class="num" x="23" y="34">4</text>
      <text class="step" x="52" y="33">目标建模</text>
      <text class="sub" x="52" y="58">三层目标</text>
    </g>
    <path d="M924 42H968" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(976 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#38BDF8"/>
      <circle cx="28" cy="28" r="16" fill="#38BDF8"/>
      <text class="num" x="23" y="34">5</text>
      <text class="step" x="52" y="33">策略生成</text>
      <text class="sub" x="52" y="58">BATNA / ZOPA</text>
    </g>
  </g>

  <g transform="translate(58 292)">
    <g>
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#34D399"/>
      <circle cx="28" cy="28" r="16" fill="#34D399"/>
      <text class="num" x="23" y="34">6</text>
      <text class="step" x="52" y="33">多方案评分</text>
      <text class="sub" x="52" y="58">MESO + score</text>
    </g>
    <path d="M192 42H236" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(244 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#34D399"/>
      <circle cx="28" cy="28" r="16" fill="#34D399"/>
      <text class="num" x="23" y="34">7</text>
      <text class="step" x="52" y="33">话术生成</text>
      <text class="sub" x="52" y="58">微信 / 邮件 / 电话</text>
    </g>
    <path d="M436 42H480" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(488 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#34D399"/>
      <circle cx="28" cy="28" r="16" fill="#34D399"/>
      <text class="num" x="23" y="34">8</text>
      <text class="step" x="52" y="33">风险审查</text>
      <text class="sub" x="52" y="58">发送前检查</text>
    </g>
    <path d="M680 42H724" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(732 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#34D399"/>
      <circle cx="28" cy="28" r="16" fill="#34D399"/>
      <text class="num" x="23" y="34">9</text>
      <text class="step" x="52" y="33">谈后确认</text>
      <text class="sub" x="52" y="58">留痕与执行</text>
    </g>
    <path d="M924 42H968" stroke="#5EEAD4" stroke-width="3" marker-end="url(#arrow)"/>
    <g transform="translate(976 0)">
      <rect x="0" y="0" width="184" height="84" rx="18" fill="#1E293B" stroke="#34D399"/>
      <circle cx="28" cy="28" r="16" fill="#34D399"/>
      <text class="num" x="18" y="34">10</text>
      <text class="step" x="52" y="33">下一轮复盘</text>
      <text class="sub" x="52" y="58">动态调整</text>
    </g>
  </g>
  <path d="M1034 206C1034 246 166 246 166 292" stroke="#5EEAD4" stroke-width="2" stroke-dasharray="8 8" marker-end="url(#arrow)" opacity="0.7"/>
</svg>
